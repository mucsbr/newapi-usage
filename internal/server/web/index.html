<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NewAPI Usage</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --line: #d9dee8;
        --text: #18202f;
        --muted: #667085;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --warn: #b45309;
        --bad: #b42318;
        --good: #047857;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 14px;
        letter-spacing: 0;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .wrap {
        width: min(1500px, calc(100vw - 32px));
        margin: 0 auto;
      }

      .topbar {
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        font-weight: 650;
      }

      h1 {
        font-size: 20px;
      }

      h2 {
        font-size: 16px;
      }

      h3 {
        font-size: 14px;
      }

      main {
        padding: 18px 0 28px;
      }

      .filters,
      .summary,
      .section {
        background: var(--panel);
        border: 1px solid var(--line);
      }

      .filters {
        padding: 14px;
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 12px;
        align-items: end;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      input,
      select,
      button {
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--text);
        padding: 0 10px;
        font: inherit;
      }

      button {
        cursor: pointer;
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
        font-weight: 600;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      button.secondary {
        background: #fff;
        color: var(--accent-strong);
      }

      button.small {
        height: 28px;
        padding: 0 8px;
        font-size: 12px;
      }

      .summary {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }

      .metric {
        padding: 14px;
        border-right: 1px solid var(--line);
        min-height: 78px;
      }

      .metric:last-child {
        border-right: 0;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .metric strong {
        display: block;
        margin-top: 8px;
        font-size: 20px;
        line-height: 1.1;
        overflow-wrap: anywhere;
      }

      .grid {
        margin-top: 14px;
        display: grid;
        grid-template-columns: minmax(0, 1.25fr) minmax(360px, 0.75fr);
        gap: 14px;
      }

      .section {
        min-width: 0;
      }

      .section-head {
        min-height: 52px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .section-subtitle {
        color: var(--muted);
        font-size: 12px;
      }

      .table-wrap {
        overflow: auto;
        max-height: 520px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 860px;
      }

      .narrow table {
        min-width: 520px;
      }

      th,
      td {
        padding: 9px 10px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: middle;
        white-space: nowrap;
      }

      th {
        position: sticky;
        top: 0;
        background: #f2f4f8;
        color: #475467;
        font-size: 12px;
        z-index: 1;
      }

      tr[data-token-id] {
        cursor: pointer;
      }

      tr.selected {
        background: #e6fffb;
      }

      .num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .muted {
        color: var(--muted);
      }

      .pill {
        display: inline-flex;
        align-items: center;
        height: 22px;
        padding: 0 8px;
        border-radius: 999px;
        border: 1px solid var(--line);
        font-size: 12px;
        background: #fff;
      }

      .pill.success {
        color: var(--good);
        border-color: #a7f3d0;
        background: #ecfdf5;
      }

      .pill.error {
        color: var(--bad);
        border-color: #fecaca;
        background: #fef2f2;
      }

      .logs {
        margin-top: 14px;
      }

      .logs .table-wrap {
        max-height: 640px;
      }

      .logs table {
        min-width: 1320px;
      }

      .log-controls {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .log-controls input,
      .log-controls select {
        width: 150px;
      }

      .pager {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .empty {
        padding: 24px 14px;
        color: var(--muted);
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgb(15 23 42 / 0.36);
      }

      .modal.hidden {
        display: none;
      }

      .modal-panel {
        width: min(1100px, calc(100vw - 32px));
        max-height: min(860px, calc(100vh - 48px));
        background: var(--panel);
        border: 1px solid var(--line);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .modal-body {
        overflow: auto;
        padding: 14px;
        display: grid;
        gap: 14px;
      }

      .audit-grid {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
        gap: 14px;
      }

      .audit-block {
        border: 1px solid var(--line);
        background: #fff;
        min-width: 0;
      }

      .audit-block h3 {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
      }

      .conversation {
        display: grid;
        gap: 10px;
        padding: 12px;
      }

      .message {
        display: grid;
        gap: 5px;
      }

      .message-role {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
      }

      .message-content,
      pre {
        margin: 0;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-family:
          ui-monospace,
          SFMono-Regular,
          Menlo,
          Consolas,
          monospace;
        font-size: 12px;
        line-height: 1.55;
      }

      pre {
        padding: 12px;
        max-height: 580px;
        overflow: auto;
        background: #0f172a;
        color: #e5e7eb;
      }

      @media (max-width: 1100px) {
        .filters {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .summary {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .metric {
          border-bottom: 1px solid var(--line);
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .audit-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .wrap {
          width: min(100vw - 20px, 1500px);
        }

        .filters {
          grid-template-columns: 1fr;
        }

        .summary {
          grid-template-columns: 1fr;
        }

        .metric {
          border-right: 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap topbar">
        <div>
          <h1>NewAPI Usage</h1>
          <div class="section-subtitle">按 key 查看模型、输入 tokens、输出 tokens 与请求日志</div>
        </div>
        <div id="health" class="pill">checking</div>
      </div>
    </header>

    <main class="wrap">
      <section class="filters">
        <label>
          开始时间
          <input id="start" type="datetime-local" />
        </label>
        <label>
          结束时间
          <input id="end" type="datetime-local" />
        </label>
        <label>
          搜索
          <input id="search" type="search" placeholder="key name / user / model" />
        </label>
        <label>
          Key 数量
          <select id="keyLimit">
            <option value="50">50</option>
            <option value="100" selected>100</option>
            <option value="200">200</option>
            <option value="500">500</option>
          </select>
        </label>
        <button id="refresh" type="button">刷新</button>
        <button id="clear" class="secondary" type="button">清空筛选</button>
      </section>

      <section class="summary" id="summary"></section>

      <section class="grid">
        <div class="section">
          <div class="section-head">
            <div>
              <h2>Key 总览</h2>
              <div class="section-subtitle">按总 tokens 降序排列</div>
            </div>
            <span id="keyCount" class="pill">0</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Token ID</th>
                  <th>Key Name</th>
                  <th>Key 尾号</th>
                  <th class="num">请求</th>
                  <th class="num">模型</th>
                  <th class="num">输入</th>
                  <th class="num">输出</th>
                  <th class="num">总 Tokens</th>
                  <th>最后使用</th>
                </tr>
              </thead>
              <tbody id="keysBody"></tbody>
            </table>
          </div>
        </div>

        <div class="section narrow">
          <div class="section-head">
            <div>
              <h2>模型分布</h2>
              <div id="selectedKey" class="section-subtitle">选择一个 key</div>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>模型</th>
                  <th class="num">请求</th>
                  <th class="num">输入</th>
                  <th class="num">输出</th>
                  <th class="num">总 Tokens</th>
                </tr>
              </thead>
              <tbody id="modelsBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="section logs">
        <div class="section-head">
          <div>
            <h2>使用日志</h2>
            <div id="logsMeta" class="section-subtitle">最近请求</div>
          </div>
          <div class="log-controls">
            <select id="logType">
              <option value="all">全部</option>
              <option value="success">成功</option>
              <option value="error">错误</option>
            </select>
            <input id="logModel" placeholder="模型筛选" />
            <button id="prevPage" class="secondary" type="button">上一页</button>
            <span id="pageInfo" class="muted">1</span>
            <button id="nextPage" class="secondary" type="button">下一页</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>时间</th>
                <th>状态</th>
                <th>Key</th>
                <th>模型</th>
                <th class="num">输入</th>
                <th class="num">输出</th>
                <th class="num">总 Tokens</th>
                <th class="num">额度</th>
                <th>用户</th>
                <th>渠道</th>
                <th>IP</th>
                <th>Request ID</th>
                <th>对话</th>
              </tr>
            </thead>
            <tbody id="logsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="auditModal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-panel">
        <div class="section-head">
          <div>
            <h2>请求体</h2>
            <div id="auditMeta" class="section-subtitle">-</div>
          </div>
          <button id="auditClose" class="secondary" type="button">关闭</button>
        </div>
        <div class="modal-body">
          <div id="auditNotice" class="pill">loading</div>
          <div class="audit-grid">
            <div class="audit-block">
              <h3>Messages</h3>
              <div id="auditMessages" class="conversation"></div>
            </div>
            <div class="audit-block">
              <h3>Raw JSON</h3>
              <pre id="auditRaw"></pre>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const state = {
        selectedTokenId: 0,
        selectedKeyName: "",
        page: 1,
        pageSize: 100,
      };

      const el = (id) => document.getElementById(id);
      const fmt = new Intl.NumberFormat("zh-CN");

      function tsToText(ts) {
        if (!ts) return "-";
        return new Date(ts * 1000).toLocaleString("zh-CN", { hour12: false });
      }

      function dateValueToUnix(value) {
        if (!value) return "";
        const ms = new Date(value).getTime();
        return Number.isFinite(ms) ? Math.floor(ms / 1000) : "";
      }

      function baseParams() {
        const params = new URLSearchParams();
        const start = dateValueToUnix(el("start").value);
        const end = dateValueToUnix(el("end").value);
        if (start) params.set("start", start);
        if (end) params.set("end", end);
        return params;
      }

      async function api(path, params = new URLSearchParams()) {
        const query = params.toString();
        const response = await fetch(query ? `${path}?${query}` : path);
        if (!response.ok) {
          const body = await response.json().catch(() => ({}));
          throw new Error(body?.error?.message || response.statusText);
        }
        return response.json();
      }

      function renderSummary(data) {
        const items = [
          ["请求", data.request_count],
          ["Keys", data.token_count],
          ["模型", data.model_count],
          ["输入 Tokens", data.input_tokens],
          ["输出 Tokens", data.output_tokens],
          ["总 Tokens", data.total_tokens],
          ["额度", data.quota],
        ];
        el("summary").innerHTML = items
          .map(([label, value]) => `<div class="metric"><span>${label}</span><strong>${fmt.format(value || 0)}</strong></div>`)
          .join("");
      }

      function renderKeys(items) {
        el("keyCount").textContent = `${items.length} keys`;
        if (!items.length) {
          el("keysBody").innerHTML = `<tr><td colspan="9" class="empty">没有数据</td></tr>`;
          return;
        }
        el("keysBody").innerHTML = items
          .map((item) => {
            const selected = Number(item.token_id) === Number(state.selectedTokenId) ? "selected" : "";
            const keyName = item.key_name || `Token #${item.token_id}`;
            return `
              <tr class="${selected}" data-token-id="${item.token_id}" data-key-name="${escapeHtml(keyName)}">
                <td>${item.token_id}</td>
                <td>${escapeHtml(keyName)}</td>
                <td class="muted">${escapeHtml(item.key_tail || "")}</td>
                <td class="num">${fmt.format(item.request_count || 0)}</td>
                <td class="num">${fmt.format(item.model_count || 0)}</td>
                <td class="num">${fmt.format(item.input_tokens || 0)}</td>
                <td class="num">${fmt.format(item.output_tokens || 0)}</td>
                <td class="num">${fmt.format(item.total_tokens || 0)}</td>
                <td>${tsToText(item.last_used_at)}</td>
              </tr>
            `;
          })
          .join("");
        document.querySelectorAll("tr[data-token-id]").forEach((row) => {
          row.addEventListener("click", () => {
            state.selectedTokenId = Number(row.dataset.tokenId);
            state.selectedKeyName = row.dataset.keyName;
            state.page = 1;
            loadModels();
            loadLogs();
            refreshKeySelection();
          });
        });
      }

      function refreshKeySelection() {
        document.querySelectorAll("tr[data-token-id]").forEach((row) => {
          row.classList.toggle("selected", Number(row.dataset.tokenId) === Number(state.selectedTokenId));
        });
        el("selectedKey").textContent = state.selectedTokenId ? `${state.selectedKeyName} · Token #${state.selectedTokenId}` : "选择一个 key";
      }

      function renderModels(items) {
        if (!items.length) {
          el("modelsBody").innerHTML = `<tr><td colspan="5" class="empty">没有数据</td></tr>`;
          return;
        }
        el("modelsBody").innerHTML = items
          .map(
            (item) => `
              <tr>
                <td>${escapeHtml(item.model_name || "unknown")}</td>
                <td class="num">${fmt.format(item.request_count || 0)}</td>
                <td class="num">${fmt.format(item.input_tokens || 0)}</td>
                <td class="num">${fmt.format(item.output_tokens || 0)}</td>
                <td class="num">${fmt.format(item.total_tokens || 0)}</td>
              </tr>
            `,
          )
          .join("");
      }

      function renderLogs(data) {
        const totalPages = Math.max(1, Math.ceil((data.total || 0) / data.page_size));
        el("logsMeta").textContent = `${fmt.format(data.total || 0)} 条`;
        el("pageInfo").textContent = `${data.page} / ${totalPages}`;
        el("prevPage").disabled = data.page <= 1;
        el("nextPage").disabled = data.page >= totalPages;
        if (!data.items?.length) {
          el("logsBody").innerHTML = `<tr><td colspan="14" class="empty">没有数据</td></tr>`;
          return;
        }
        el("logsBody").innerHTML = data.items
          .map((item) => {
            const status = item.type === 5 ? `<span class="pill error">错误</span>` : `<span class="pill success">成功</span>`;
            return `
              <tr>
                <td>${item.id}</td>
                <td>${tsToText(item.created_at)}</td>
                <td>${status}</td>
                <td>${escapeHtml(item.key_name || item.token_name || "")}</td>
                <td>${escapeHtml(item.model_name || "")}</td>
                <td class="num">${fmt.format(item.input_tokens || 0)}</td>
                <td class="num">${fmt.format(item.output_tokens || 0)}</td>
                <td class="num">${fmt.format(item.total_tokens || 0)}</td>
                <td class="num">${fmt.format(item.quota || 0)}</td>
                <td>${escapeHtml(item.username || "")}</td>
                <td>${escapeHtml(item.channel_name || String(item.channel_id || ""))}</td>
                <td>${escapeHtml(item.ip || "")}</td>
                <td class="muted">${escapeHtml(item.request_id || "")}</td>
                <td><button class="secondary small audit-open" type="button" data-log-id="${item.id}">查看</button></td>
              </tr>
            `;
          })
          .join("");
        document.querySelectorAll("button[data-log-id]").forEach((button) => {
          button.addEventListener("click", () => {
            openAuditDialog(button.dataset.logId).catch(notifyError);
          });
        });
      }

      async function openAuditDialog(logId) {
        el("auditModal").classList.remove("hidden");
        el("auditMeta").textContent = `Log #${logId}`;
        el("auditNotice").textContent = "loading";
        el("auditNotice").className = "pill";
        el("auditMessages").innerHTML = "";
        el("auditRaw").textContent = "";

        const data = await api(`/api/logs/${logId}/audit`);
        renderAuditDetail(data);
      }

      function renderAuditDetail(data) {
        const log = data.log || {};
        el("auditMeta").textContent = `${tsToText(log.created_at)} · ${log.key_name || log.token_name || ""} · ${log.model_name || ""}`;
        if (!data.enabled) {
          el("auditNotice").textContent = "audit disabled";
          el("auditNotice").className = "pill error";
          el("auditMessages").innerHTML = `<div class="empty">未配置 AUDIT_LOG_GLOB</div>`;
          return;
        }
        const item = data.items?.[0];
        if (!item) {
          el("auditNotice").textContent = "not found";
          el("auditNotice").className = "pill error";
          el("auditMessages").innerHTML = `<div class="empty">没有匹配到请求体</div>`;
          return;
        }
        const timestampNote = item.has_timestamp ? "" : " · no timestamp";
        el("auditNotice").textContent = `${item.matched_by || "matched"}${timestampNote} · ${item.matched_note || ""} · ${item.source_path}:${item.source_line}`;
        el("auditNotice").className = "pill success";
        const messages = item.messages || [];
        if (messages.length) {
          el("auditMessages").innerHTML = messages
            .map(
              (message) => `
                <div class="message">
                  <div class="message-role">${escapeHtml(message.role || "message")}</div>
                  <div class="message-content">${escapeHtml(message.content || "")}</div>
                </div>
              `,
            )
            .join("");
        } else {
          el("auditMessages").innerHTML = `<div class="empty">这个请求体没有解析出 messages</div>`;
        }
        el("auditRaw").textContent = prettyJSON(item.body || "");
      }

      function closeAuditDialog() {
        el("auditModal").classList.add("hidden");
      }

      function prettyJSON(value) {
        try {
          return JSON.stringify(JSON.parse(value), null, 2);
        } catch {
          return value;
        }
      }

      async function loadAll() {
        await checkHealth();
        const params = baseParams();
        const keyParams = new URLSearchParams(params);
        const query = el("search").value.trim();
        if (query) keyParams.set("q", query);
        keyParams.set("limit", el("keyLimit").value);

        const [summary, keys] = await Promise.all([api("/api/summary", params), api("/api/keys", keyParams)]);
        renderSummary(summary);
        renderKeys(keys);
        if (!state.selectedTokenId && keys.length) {
          state.selectedTokenId = Number(keys[0].token_id);
          state.selectedKeyName = keys[0].key_name || `Token #${keys[0].token_id}`;
          refreshKeySelection();
        }
        await Promise.all([loadModels(), loadLogs()]);
      }

      async function loadModels() {
        if (!state.selectedTokenId) {
          renderModels([]);
          return;
        }
        const params = baseParams();
        params.set("limit", "100");
        const data = await api(`/api/keys/${state.selectedTokenId}/models`, params);
        renderModels(data);
      }

      async function loadLogs() {
        const params = baseParams();
        if (state.selectedTokenId) params.set("token_id", state.selectedTokenId);
        const model = el("logModel").value.trim();
        if (model) params.set("model", model);
        params.set("type", el("logType").value);
        params.set("page", state.page);
        params.set("page_size", state.pageSize);
        const data = await api("/api/logs", params);
        renderLogs(data);
      }

      async function checkHealth() {
        try {
          await api("/api/health");
          el("health").textContent = "database connected";
          el("health").className = "pill success";
        } catch (error) {
          el("health").textContent = "database error";
          el("health").className = "pill error";
          throw error;
        }
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function notifyError(error) {
        console.error(error);
        el("logsMeta").textContent = error.message;
      }

      el("refresh").addEventListener("click", () => {
        state.page = 1;
        loadAll().catch(notifyError);
      });
      el("clear").addEventListener("click", () => {
        el("start").value = "";
        el("end").value = "";
        el("search").value = "";
        el("logModel").value = "";
        el("logType").value = "all";
        state.selectedTokenId = 0;
        state.selectedKeyName = "";
        state.page = 1;
        loadAll().catch(notifyError);
      });
      el("prevPage").addEventListener("click", () => {
        state.page = Math.max(1, state.page - 1);
        loadLogs().catch(notifyError);
      });
      el("nextPage").addEventListener("click", () => {
        state.page += 1;
        loadLogs().catch(notifyError);
      });
      el("logType").addEventListener("change", () => {
        state.page = 1;
        loadLogs().catch(notifyError);
      });
      el("logModel").addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          state.page = 1;
          loadLogs().catch(notifyError);
        }
      });
      el("search").addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          state.page = 1;
          state.selectedTokenId = 0;
          loadAll().catch(notifyError);
        }
      });
      el("auditClose").addEventListener("click", closeAuditDialog);
      el("auditModal").addEventListener("click", (event) => {
        if (event.target === el("auditModal")) {
          closeAuditDialog();
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeAuditDialog();
        }
      });

      loadAll().catch(notifyError);
    </script>
  </body>
</html>
