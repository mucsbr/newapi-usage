# Put this in the server/location that proxies NewAPI relay traffic.
#
# Example:
#   location / {
#     access_by_lua_file /etc/nginx/lua/audit.lua;
#     proxy_pass http://new-api:3000;
#   }

client_body_buffer_size 16m;
client_max_body_size 50m;
lua_need_request_body on;

access_by_lua_file /etc/nginx/lua/audit.lua;
